name: X Auto Post Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # 💡 警告が出ないように24に変更しました

    - name: Install dependencies
      run: npm install # 💡 エラーの原因だった npm ci から npm install に変更しました

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: Run bot script
      env:
        COOKIE_JSON_DATA: ${{ secrets.COOKIE_JSON }}
      run: node x_auto_post_bot_script.js
