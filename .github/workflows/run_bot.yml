name: X Auto Post Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # 警告を消すために確実に固定

    - name: Install dependencies
      run: npm install

    # Linux環境に必要なすべての依存パッケージを含めてPlaywrightブラウザを強制インストール
    - name: Install Playwright Browsers & Deps
      run: npx playwright install --with-deps chromium

    - name: Run bot script
      env:
        COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
      run: node x_auto_post_bot_script.js
